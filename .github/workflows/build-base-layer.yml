name: Build Lightwind Base Layer

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Lightwind version to build'
        required: false
        default: '0.1.0-SNAPSHOT'

jobs:
  build-layer:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            platform: linux-amd64
          - os: ubuntu-24.04-arm
            arch: arm64
            platform: linux-arm64
          - os: macos-latest
            arch: arm64
            platform: macos-arm64

    runs-on: ${{ matrix.os }}
    name: Base Layer (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build lightwind-core
        run: mvn install -pl lightwind-core -am -DskipTests

      - name: Build base layer
        run: |
          mvn package -pl lightwind-core \
            -Pnative-base-layer \
            -DskipTests

      - name: Package layer artifact
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          VERSION=${VERSION#v}  # strip leading 'v'
          ARTIFACT="lightwind-base-${VERSION}-${{ matrix.platform }}.nil"

          # Find the .nil file produced by native-image --shared
          find lightwind-core/target -name "*.nil" -o -name "lightwind-base*" | head -5

          # Copy to a consistent name
          if [ -f lightwind-core/target/lightwind-base.nil ]; then
            cp lightwind-core/target/lightwind-base.nil "$ARTIFACT"
          else
            echo "Base layer .nil file not found, checking for shared library output..."
            find lightwind-core/target -name "*.so" -o -name "*.dylib" | head -5
            exit 1
          fi

          echo "ARTIFACT=$ARTIFACT" >> $GITHUB_ENV
          echo "Built: $ARTIFACT ($(du -h $ARTIFACT | cut -f1))"

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}

      - name: Upload as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: lightwind-base-${{ matrix.platform }}
          path: ${{ env.ARTIFACT }}
